[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "SMTP_USER,VITE_HCAPTCHA_SITE_KEY,MAIL_TO"
  NODE_VERSION = "20"
  
[[redirects]]
  from = "/api/rfq"
  to = "/.netlify/functions/rfq"
  status = 200
  force = true
  methods = ["POST", "OPTIONS"]

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
